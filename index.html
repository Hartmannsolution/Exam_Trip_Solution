<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Trip Solution</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #18202f;
            background: #f6f8fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        main {
            width: min(720px, 100%);
            padding: 40px;
            border: 1px solid #d8dee9;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 16px 40px rgba(24, 32, 47, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            max-width: 60ch;
            color: #4c566a;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        a {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            padding: 0 16px;
            border: 1px solid #c5ccd8;
            border-radius: 6px;
            color: #1f4f82;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover,
        a:focus-visible {
            border-color: #1f4f82;
            background: #edf5ff;
            outline: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>Exam Trip Solution</h1>
        <p>
            This is the default page for the project. The API routes are available under the existing
            <strong>/api</strong> path.
        </p>

        <div class="links">
            <a href="/api/auth/test">Auth Test</a>
            <a href="/api/trips">Trips API</a>
            <a href="/api/routes">Route Overview</a>
        </div>
    </main>
</body>
</html>
